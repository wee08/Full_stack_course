<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testing fetching APi</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container">
      <label for="name">Name</label>
      <input type="text" id="name" />
      <label for="price">price</label>
      <input type="text" id="price" />
      <label for="color">color</label>
      <input type="text" id="color" />
      <button type="submit">Add</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>id</th>
          <th>name</th>
          <th>price</th>
          <th>color</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr>
          <td>1</td>
          <td>Iced latte</td>
          <td>$3.50</td>
          <td>brown</td>
        </tr>
        <!-- more rows -->
      </tbody>
    </table>
  </body>
  <script>
    const baseURL = "http://localhost:3000/v1/api/product/";
    const tbody = document.getElementById("tbody");
    function getAllItem() {
      fetch(baseURL + "list")
        .then((response) => response.json())
        .then((data) => {
          let item = "";

          const length = data.products.length;
          const objects = data.products;
          for (let i = 0; i < length; i++) {
            item += `
                <tr>
                    <td>${objects[i].id}</td>
                    <td>${objects[i].name}</td>
                    <td>${objects[i].price}</td>
                    <td>${objects[i].color}</td>
                </tr>
            `;
          }
          tbody.innerHTML = item;
        });
    }
    getAllItem();
