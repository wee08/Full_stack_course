<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Testing fetching APi</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="container hidden" id="popup">
      <h2>Add Product</h2>
      <input type="text" id="name" placeholder="Product Name" />
      <input type="number" id="price" placeholder="Product Price" />
      <input type="text" id="color" placeholder="Product Color" />
      <button type="submit" id="save-btn" >save</button>
  </button>
    </div>
    <table>
      <thead>
        <tr>
          <th>id</th>
          <th>name</th>
          <th>price</th>
          <th>color</th>
          <th>
            <button type="submit" id="submit-btn">Add Product</button>
          </th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </body>
  <script>
    const baseURL = "http://localhost:3000/v1/api/product/";

    let btnAction;

    const tbody = document.getElementById("tbody");
    let id;
    function getAllItem() {
      fetch(baseURL + "list")
        .then((response) => response.json())
        .then((data) => {
          let item = "";
          const length = data.products.length;
          const objects = data.products;
          for (let i = 0; i < length; i++) {
            item += `
                <tr>
                  <td>${objects[i].id}</td>
                  <td>${objects[i].name}</td>
                  <td>${objects[i].price}</td>
                  <td>${objects[i].color}</td>
                  <td>
                    <button class="edit-btn" id="edit-btn-${objects[i].id}" onclick="handleEdit(${objects[i].id})">Edit</button>
                    <button class="delete-btn" id="delet-btn-${objects[i].id}" onclick="handleDelete(${objects[i].id})">Delete</button>
                  </td>
                </tr>
            `;
          }
          tbody.innerHTML = item;
        });
    }
    getAllItem();

    const addBtn = document.getElementById("submit-btn");
    const saveBtn = document.getElementById("save-btn");
    const popup = document.getElementById("popup")
    const editBtn = document.querySelectorAll(".edit-btn")
    saveBtn.onclick = () => {
      const name = document.getElementById("name").value;
      const price = document.getElementById("price").value;
      const color = document.getElementById("color").value;

      popup.classList.add("hidden");

      fetch(baseURL + ( btnAction === addBtn.innerHTML ? "create":"update"), {
        method: btnAction === addBtn.innerHTML ? "POST":"PUT",
        headers: { "content-Type": "application/json" },
        body: JSON.stringify({
          id,
          name,
          price,
          color,
        }),
      })
        .then(() => getAllItem())
        .catch((error) => alert(error.message));
    }

    addBtn.onclick = (e) => {
      btnAction = e.target.innerHTML;
      popup.classList.remove("hidden");
    };


    function handleEdit(productId) {
      btnAction = "Edit";
      id = productId;
      popup.classList.remove('hidden');
    }

    function handleDelete(e) {
      const id = e;
      fetch(baseURL + "delete", {
        method: "DELETE",
        headers: { "content-Type": "application/json" },
        body: JSON.stringify({
          id,
        }),
      })
        .then(() => getAllItem())
        .catch((error) => alert(error.message));
    }
  </script>
</html>
