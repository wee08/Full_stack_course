<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="container">
      <div class="header">
        <h1>Hello!</h1>
        <p>Welcome to our website</p>
      </div>
      <form class="login-form">
        <h1>Sign up</h1>
        <div class="input-container">
          <input
            type="email"
            id="email"
            placeholder="email"
            autocomplete="username" />
          <div id="password-field">
            <input
              type="password"
              id="password"
              placeholder="password"
              autocomplete="new-password" />
            <p class="alert-message" id="alert-message"></p>
          </div>
          <input
            type="password"
            id="cf-password"
            placeholder="confirm password"
            autocomplete="new-password" />
          <input type="text" id="phone" placeholder="phone" />
        </div>
        <button type="button" class="login-btn" id="signup-btn">Sign Up</button>
        <div class="sign-up">
          <p>Already have account?</p>
          <a href="./index.html">Login</a>
        </div>
      </form>
    </main>
  </body>
  <script>
    const emailEle = document.getElementById("email");
    const passworrdEle = document.getElementById("password");
    const cfPasswordEle = document.getElementById("cf-password");
    const alertMessageELe = document.getElementById("alert-message");
    const phoneELe = document.getElementById("phone");

    const signupBtn = document.getElementById("signup-btn");

    const isMissMatch = () => {
      const password = passworrdEle.value;
      const cfPassword = cfPasswordEle.value;

      if (cfPassword.lenght === 0) {
        alertMessageELe.innerHTML = "";
        return false;
      }
      if (password !== cfPassword) {
        alertMessageELe.innerHTML = "password not match!";
        return false;
      } else {
        alertMessageELe.innerHTML = "";
        return true;
      }
    };
    passworrdEle.addEventListener("input", isMissMatch);
    cfPasswordEle.addEventListener("input", isMissMatch);

    const baseURL = "http://localhost:3000/v1/api/user/";

    const handleSignup = () => {
      const email = emailEle.value;
      const phone = phoneELe.value;
      const password = passworrdEle.value;
      const confirmPassword = cfPasswordEle.value;

      fetch(baseURL + "signup", {
        method: "POST",
        headers: { "Content-Type": "applicatoin/json" },
        body: JSON.stringify({
          email: "malis.tep@outl123123ook.com",
          password: "sokha2024",
          confirmPassword: "sokha2024",
          phone: "12123123",
        }),
      })
        .then((res) => console.log(res))
        .catch((error) => alert(error.message));
    };
    signupBtn.onclick = () => {
      handleSignup();
    };
  </script>
</html>
